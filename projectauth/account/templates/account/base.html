<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Auth System{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e2e8f0;
    min-height: 100vh;
  }
  nav.topbar {
    background: linear-gradient(135deg, #166534, #16a34a);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 2px 16px rgba(22,163,74,0.3);
  }
  .topbar-brand { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
  .topbar-links { display: flex; gap: 4px; margin-left: auto; }
  .topbar-links a, .topbar-links button {
    color: rgba(255,255,255,0.85);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-size: 13px;
    background: none;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
  }
  .topbar-links a:hover, .topbar-links button:hover { background: rgba(0,0,0,0.2); color: #fff; }
  .topbar-links a.active { background: rgba(0,0,0,0.25); color: #fff; font-weight: 600; }
  .topbar-user {
    font-size: 12px;
    background: rgba(0,0,0,0.2);
    padding: 5px 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .container { max-width: 960px; margin: 0 auto; padding: 36px 24px; }
  .card {
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 16px; font-weight: 700; color: #f0fdf4; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input {
    width: 100%;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 10px 14px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus { border-color: #16a34a; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-green  { background: linear-gradient(135deg,#166534,#16a34a); color: #fff; }
  .btn-red    { background: linear-gradient(135deg,#7f1d1d,#dc2626); color: #fff; }
  .btn-gray   { background: #21262d; color: #8b949e; }
  .btn-sm     { padding: 6px 14px; font-size: 12px; }
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    font-size: 13px;
    display: none;
  }
  .alert.show { display: block; }
  .alert-ok  { background: #0f2e1f; border: 1px solid #166534; color: #86efac; }
  .alert-err { background: #2d0f0f; border: 1px solid #7f1d1d; color: #fca5a5; }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .badge-green { background: #1a3a1a; color: #4ade80; }
  .badge-blue  { background: #1e3a5f; color: #60a5fa; }
  .badge-red   { background: #3a1a1a; color: #f87171; }
  .badge-gray  { background: #21262d; color: #8b949e; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 12px; color: #6e7681; font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #21262d; }
  td { padding: 10px 12px; border-bottom: 1px solid #161b22; }
  tr:hover td { background: #1a2030; }
  .link { color: #4ade80; text-decoration: none; font-size: 13px; }
  .link:hover { text-decoration: underline; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .stat-card { background: #0d1117; border: 1px solid #21262d; border-radius: 10px; padding: 20px; }
  .stat-card .stat-num { font-size: 32px; font-weight: 700; color: #4ade80; }
  .stat-card .stat-label { font-size: 12px; color: #6e7681; margin-top: 4px; }
  .json-box {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 14px;
    font-family: monospace;
    font-size: 13px;
    color: #d1fae5;
    white-space: pre;
    overflow-x: auto;
    max-height: 300px;
    overflow-y: auto;
    display: none;
  }
  .json-box.show { display: block; }
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .tab {
    padding: 8px 18px;
    border-radius: 8px;
    border: 1px solid #21262d;
    background: #161b22;
    color: #8b949e;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
  }
  .tab:hover { border-color: #4ade80; color: #e2e8f0; }
  .tab.active { background: #1a3a1a; border-color: #16a34a; color: #4ade80; font-weight: 600; }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .text-muted { color: #6e7681; font-size: 13px; }
</style>
</head>
<body>

<nav class="topbar">
  <div class="topbar-brand">🔐 Auth System</div>
  <div class="topbar-links" id="nav-links"></div>
</nav>

{% block content %}{% endblock %}

<script>
const API = '';

function getToken() { return localStorage.getItem('jwt_token'); }
function getUser()  { try { return JSON.parse(localStorage.getItem('jwt_user') || 'null'); } catch { return null; } }

function renderNav() {
  const user = getUser();
  const nav  = document.getElementById('nav-links');
  if (user) {
    nav.innerHTML = `
      <span class="topbar-user">👤 ${user.first_name} <span style="opacity:.6;font-size:11px">${user.role}</span></span>
      <a href="/dashboard/" ${location.pathname==='/dashboard/'?'class="active"':''}>Дашборд</a>
      <a href="/catalog/"   ${location.pathname==='/catalog/'  ?'class="active"':''}>Каталог</a>
      <button onclick="logout()">Выйти</button>
    `;
  } else {
    nav.innerHTML = `
      <a href="/login/"    ${location.pathname==='/login/'   ?'class="active"':''}>Войти</a>
      <a href="/register/" ${location.pathname==='/register/'?'class="active"':''}>Регистрация</a>
    `;
  }
}

async function logout() {
  const token = getToken();
  if (token) {
    await fetch(API + '/api/auth/logout/', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(() => {});
  }
  localStorage.removeItem('jwt_token');
  localStorage.removeItem('jwt_user');
  location.href = '/login/';
}

async function apiCall(method, path, body) {
  const headers = { 'Content-Type': 'application/json' };
  const token = getToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res  = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : undefined });
  const data = await res.json().catch(() => ({}));
  return { status: res.status, data };
}

function showAlert(id, type, msg) {
  const el = document.getElementById(id);
  el.className = 'alert show alert-' + type;
  el.textContent = msg;
}

renderNav();
{% block scripts %}{% endblock %}
</script>
</body>
</html>
